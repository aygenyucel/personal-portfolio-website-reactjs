<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Maintenance</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #6366f1, transparent 70%);
      top: -100px;
      left: -100px;
      filter: blur(120px);
      opacity: 0.6;
      animation: float 6s ease-in-out infinite;
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #22c55e, transparent 70%);
      bottom: -120px;
      right: -120px;
      filter: blur(120px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      padding: 50px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 90%;
    }

    .logo {
      font-weight: 600;
      margin-bottom: 20px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,197,94,0.1);
      color: #22c55e;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .button {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .button:hover {
      background: #4f46e5;
    }

    .footer {
      font-size: 12px;
      color: #64748b;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">YOUR BRAND</div>

    <div class="status">
      <div class="dot"></div>
      System update in progress
    </div>

    <h1>We’ll be back soon 🚧</h1>

    <p>
      We’re currently performing maintenance to improve your experience.<br/>
      Thanks for your patience — we’ll be back shortly.
    </p>

    <!-- optional -->
    <a href="mailto:youremail@mail.com" class="button">Contact us</a>

    <div class="footer">
      © 2026 All rights reserved
    </div>
  </div>

</body>
</html>
